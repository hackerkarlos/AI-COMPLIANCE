name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type checking
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v4

      - name: Check for test files
        id: test-files
        run: |
          TEST_FILES=$(git ls-files --others -c --exclude-standard '*.test.ts' '*.test.tsx' '*.spec.ts' '*.spec.tsx' | grep -c . || true)
          EXISTING_FILES=$(git ls-files '*.test.ts' '*.test.tsx' '*.spec.ts' '*.spec.tsx' | grep -c . || true)
          TOTAL=$((TEST_FILES + EXISTING_FILES))
          echo "has_tests=$([ $TOTAL -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "Found $TOTAL test files"

      - name: Setup pnpm
        if: steps.test-files.outputs.has_tests == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - name: Setup Node.js
        if: steps.test-files.outputs.has_tests == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.test-files.outputs.has_tests == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        if: steps.test-files.outputs.has_tests == 'true'
        run: pnpm test
